openapi: 3.0.4
info:
  title: Go Svelte
  version: 0.1.0
paths:
  /ping:
    get:
      description: Check if backend is available
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pong"
components:
  schemas:
    Pong:
      type: object
      properties:
        result:
          type: string
          example: pong
      required:
        - result
